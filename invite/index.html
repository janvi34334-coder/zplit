<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    button {
      background: #6c47ff;
      color: white;
      padding: 16px 32px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }
    p { color: #666; margin-bottom: 24px; }
  </style>
</head>
<body>
  <p>You have been invited to Zplit!</p>
  <button onclick="openApp()">Open in Zplit</button>

  <script>
    function openApp() {
      const d = new URLSearchParams(window.location.search).get('d') || '';
      window.location.href = 'intent://invite/v1?d=' + d + '#Intent;scheme=zplit;package=com.example.zplit;S.browser_fallback_url=about%3Ablank;end';
    }
  </script>
</body>
</html>
